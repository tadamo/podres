apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.2"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.2/kubectl-podres_linux_amd64.tar.gz
      sha256: "69fa04be96b61567d2337469e627c21284b8a1aea9261538ba72bada1d9bc966"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.2/kubectl-podres_linux_arm64.tar.gz
      sha256: "a700f9c96f2b6a2c66fcbd85819685bbd8291fb25cd4ff5c0f2157020ddfd595"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.2/kubectl-podres_darwin_amd64.tar.gz
      sha256: "50bcb1d3a7a0b3f85780e650d36a61f6165e5ccf4e572ac74928e7daaebd3645"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.2/kubectl-podres_darwin_arm64.tar.gz
      sha256: "b841959d4d1c2d2a6687457c5152c7d8102e47f915429c17a48199872b6628a2"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.2/kubectl-podres_windows_amd64.zip
      sha256: "e93026e16f91bdedd264023cf78b6cde2e499a327f933d1f9df873210cd09757"
      bin: kubectl-podres.exe
