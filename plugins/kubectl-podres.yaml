apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.6"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.6/kubectl-podres_linux_amd64.tar.gz
      sha256: "d052772f37de850595040196eb6b140eb4c1d9c909857d2b79ccf0625b550703"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.6/kubectl-podres_linux_arm64.tar.gz
      sha256: "1bc5d5332449eeed8dde41ab4413c52e0f0275eb5ac1651e2cafa23db5d165cc"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.6/kubectl-podres_darwin_amd64.tar.gz
      sha256: "a964762a6ebaf039447f7faf07704b397b0cd7db7d0bbc7a5f099efd6e21bd07"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.6/kubectl-podres_darwin_arm64.tar.gz
      sha256: "97bd44ace6562845d70e79b34a9bafdaccc4dad46559979ddb43c3d43514108c"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.6/kubectl-podres_windows_amd64.zip
      sha256: "9d8f764b4a62085c7136e98a677c162e4a3d7938f44c66e4c1a269b0663adca7"
      bin: kubectl-podres.exe
