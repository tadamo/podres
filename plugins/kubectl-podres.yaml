apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.0"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.0/kubectl-podres_linux_amd64.tar.gz
      sha256: "4f29faf71781fb9f682666e6566b506ed4f0c89604ee96cf91343bf72fb2198b"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.0/kubectl-podres_linux_arm64.tar.gz
      sha256: "8287c86c9e43090a01dd9b80fc474bf6922d76e56fb0736a365aa0a57115350b"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.0/kubectl-podres_darwin_amd64.tar.gz
      sha256: "afb951cabaf301b48deed48049d1b23cb5661e41dc99bf9f51985670f77d9c61"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.0/kubectl-podres_darwin_arm64.tar.gz
      sha256: "520a47deed5796f533efefaa06b72275180e1de55e5d782ddebe96c900960da9"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.0/kubectl-podres_windows_amd64.zip
      sha256: "57be46ae36be6466d8def81469f851e62b6d674f7376ff0f59f687deb5332ec8"
      bin: kubectl-podres.exe
