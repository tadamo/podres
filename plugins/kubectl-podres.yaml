apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.9"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.9/kubectl-podres_linux_amd64.tar.gz
      sha256: "5fcc5dd63a2c780144592fa49e89d79ee002e1aed40eea7a86f271eb61a88845"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.9/kubectl-podres_linux_arm64.tar.gz
      sha256: "fcd718946ca8474831301015bab8dc23bc34d620ddb6778c164a785528ce4355"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.9/kubectl-podres_darwin_amd64.tar.gz
      sha256: "216a1306cf7f2aec2377ca93e8de467eef783efd1e533268c8f92333abf17341"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.9/kubectl-podres_darwin_arm64.tar.gz
      sha256: "75e3a8c772f101d1a39b82ed0a628261ed9d1fe7ce162aad3da6c8ef14f10681"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.9/kubectl-podres_windows_amd64.zip
      sha256: "4662a9eb1473e9b0d9af2e002aafc50f63984b0c1aaf456df7e6b422f6b05e09"
      bin: kubectl-podres.exe
