apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.7"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.7/kubectl-podres_linux_amd64.tar.gz
      sha256: "5bfd02cd1ff080ce7d6a1a48bf6ce57525e251b28a60458d63d5bfaa74e60cc9"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.7/kubectl-podres_linux_arm64.tar.gz
      sha256: "06ea1d8beffb0bf9cda1bbfe1994fba661dfba388b70bd4b99c54e0d7162a6a5"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.7/kubectl-podres_darwin_amd64.tar.gz
      sha256: "aa64673829e3cd472a5acf66d74138356446ffe18ea26646ece852602c044e4a"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.7/kubectl-podres_darwin_arm64.tar.gz
      sha256: "ca56b77e838a2803c22d7448e0801dfd1c95c766c3dff1930d9906e3501a3446"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.7/kubectl-podres_windows_amd64.zip
      sha256: "bee2ca80f1c3f2eeeaf3bc8b320711ce6ac032f900134a57fdf6f2467cdb9b8f"
      bin: kubectl-podres.exe
