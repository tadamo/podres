apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.5"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.5/kubectl-podres_linux_amd64.tar.gz
      sha256: "2dae4b648a50d15f5c4f2a620a47d45e6836ff4c9da8d91ec246c8e534805d82"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.5/kubectl-podres_linux_arm64.tar.gz
      sha256: "efdb1921d13347316fb2c4a840a130daf62295298de8cfb9394f2481e466299c"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.5/kubectl-podres_darwin_amd64.tar.gz
      sha256: "cd98eac6747efbdac517f7afef603e62ba7385e602a25051c4cc122f818357db"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.5/kubectl-podres_darwin_arm64.tar.gz
      sha256: "61df7bbff026c5767d12bcb0fe7a0c6db800f7a6008542a0ec086ec5f30670b8"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.5/kubectl-podres_windows_amd64.zip
      sha256: "4051800bca8facb4543a274b42418490efd7eeaebbd428416ef40d1a67aa3cf5"
      bin: kubectl-podres.exe
