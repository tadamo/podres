apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.3"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.3/kubectl-podres_linux_amd64.tar.gz
      sha256: "401f7bb49642646daac31f5cee3f08a24d4fd7a903aa5d1bb69268395435d88a"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.3/kubectl-podres_linux_arm64.tar.gz
      sha256: "bf41805c2610e8c684e2251875bbade912dac00bf1b10620214c7856b209b2ac"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.3/kubectl-podres_darwin_amd64.tar.gz
      sha256: "9f097ec3e215086d3406f11981f7f3f84d6005afa219c15debad5121434c2c0c"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.3/kubectl-podres_darwin_arm64.tar.gz
      sha256: "b351000fa64bdd15fe00e873184818a7eb0f144b4a5024c72f77615d89087247"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.3/kubectl-podres_windows_amd64.zip
      sha256: "c3c3c883232dd6e325aeb17bc8d4dbdd38f475e091cac70510dd8c0610a8d93a"
      bin: kubectl-podres.exe
