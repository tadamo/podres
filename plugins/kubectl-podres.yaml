apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: podres
spec:
  version: "v1.0.1"
  homepage: https://github.com/tadamo/podres
  shortDescription: "Watch pod resource requests, limits, and live utilization"
  description: |
    podres displays a real-time, colorized view of Kubernetes pod and container
    resource requests, limits, and live utilization in a single compact table.

    Requires metrics-server to be installed in the cluster for live CPU/memory
    usage data. Falls back gracefully (showing N/A) when metrics-server is
    unavailable.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.1/kubectl-podres_linux_amd64.tar.gz
      sha256: "dc43f0b1c839bb18a22d11a3c7be16cdb4343b66ab52f96ff99aa6e1aa16996f"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.1/kubectl-podres_linux_arm64.tar.gz
      sha256: "b51ed5342977681817252764517c49ed09e21c722c62e6ed8b40b66fe119a54a"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.1/kubectl-podres_darwin_amd64.tar.gz
      sha256: "0f1c6b217c28306225c405432d86eb2b7cde9da47dfcc593f0226177f43d2619"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.1/kubectl-podres_darwin_arm64.tar.gz
      sha256: "7b0e29666419854b530a2063eaca24df7829afc213d467139636b7857b63c4cf"
      bin: kubectl-podres

    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/tadamo/podres/releases/download/v1.0.1/kubectl-podres_windows_amd64.zip
      sha256: "58bba8a2c4bd1d94ddd34aa006a33d3f2a007e5863ef5416e8bd4613f7f323bb"
      bin: kubectl-podres.exe
